name: Oracle Cloud Repeater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Run every hour

jobs:
  create-instance:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install OCI CLI
        run: |
          python -m pip install oci-cli
      
      - name: Create OCI Config
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/private_key.pem
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=us-chicago-1
          EOF
      
      - name: Create Private Key
        run: |
          cat > ~/.oci/private_key.pem << 'EOF'
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.oci/private_key.pem
      
      - name: Create Instance (Keep Retrying)
        run: |
          #!/bin/bash
          END=$((SECONDS + 14400))  # 4 hours
          
          while [ $SECONDS -lt $END ]; do
            echo "Attempting to create instance..."
            
            oci compute instance launch \
              --availability-domain "CrbD:US-CHICAGO-1-AD-3" \
              --compartment-id "ocid1.tenancy.oc1..aaaaaaaabolm5rkgqzc7ykgcz7ppb2gf22c57ue2xdkqk5sl5so6xlzxpr3q" \
              --image-id "ocid1.image.oc1.us-chicago-1.aaaaaaaaremq2g7crdfi5dv44tadt75p7c4jop4kkhbdesybo25gjj6sd5nq" \
              --shape "VM.Standard.A1.Flex" \
              --subnet-id "ocid1.subnet.oc1.us-chicago-1.aaaaaaaar676hptnkckjslr3nbtzvmqbgtplha7pwuxilibprmltkrlthcmq" \
              --display-name "casaos-tailscale" \
              --shape-config '{"ocpus":4,"memoryInGbs":24}' \
              --boot-volume-size-in-gbs 200 \
              --metadata '{"ssh_authorized_keys":"ssh-rsa  cscinfo\\\\sbukhar1@USgx2UGSVB8ic3t"}' && \
            echo "SUCCESS! Instance created!" && \
            exit 0
            
            # If failed, wait 60 seconds and try again
            echo "Out of capacity. Retrying in 60 seconds..."
            sleep 60
          done
          
          echo "Timeout reached. Try again later."
          exit 1
